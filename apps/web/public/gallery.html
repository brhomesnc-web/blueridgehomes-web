function openLB(src, path) {
  document.getElementById('li').src = src;
  document.getElementById('lp').textContent = path;
  document.getElementById('lb').classList.add('show');
}

function copyPath(path, ev) {
  ev.stopPropagation();
  navigator.clipboard.writeText(path);
  var t = document.getElementById('t');
  t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 1200);
}

function doFilter() {
  var q = document.getElementById('q').value.toLowerCase();
  document.querySelectorAll('.folder').forEach(function(f) {
    var cards = f.querySelectorAll('.card');
    var vis = 0;
    cards.forEach(function(c) {
      var match = c.dataset.p.toLowerCase().indexOf(q) >= 0;
      c.style.display = match ? '' : 'none';
      if (match) vis++;
    });
    f.style.display = vis ? '' : 'none';
  });
}

var g = document.getElementById('g');
var folders = Object.keys(DATA).sort();
folders.forEach(function(folder) {
  var imgs = DATA[folder];
  var div = document.createElement('div');
  div.className = 'folder';
  
  var header = document.createElement('div');
  header.className = 'fh';
  header.innerHTML = '<span class="fn">' + folder + '/</span><span class="fc">' + imgs.length + '</span>';
  header.onclick = function() {
    var grid = this.nextElementSibling;
    grid.style.display = grid.style.display === 'none' ? 'grid' : 'none';
  };
  div.appendChild(header);
  
  var grid = document.createElement('div');
  grid.className = 'grid';
  
  imgs.forEach(function(path) {
    var name = path.split('/').pop().replace(/\.[^.]+$/, '');
    var card = document.createElement('div');
    card.className = 'card';
    card.dataset.p = path;
    card.onclick = function() { openLB(path, path); };
    card.innerHTML = '<img src="' + path + '" loading="lazy"><div class="ci"><div class="cn" onclick="copyPath(\'' + path + '\', event)">' + name + '</div></div>';
    grid.appendChild(card);
  });
  
  div.appendChild(grid);
  g.appendChild(div);
});
</script></body></html>
